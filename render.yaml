services:
  - type: web
    name: core-panel-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
