services:
  - type: web
    name: core-panel-backend
    runtime: node
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w apps/backend
    startCommand: node apps/backend/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
